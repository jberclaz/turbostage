name: MacOS Build

on:
  pull_request:
    branches: [master]
  push:
    tags:
      - 'v*'

jobs:
  build-macos:

    runs-on: macos-latest

    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pillow

      - name: Convert icon to ICNS and background to PNG
        run: |
          mkdir -p icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size turbostage/content/icon.png \
              --out icon.iconset/icon_${size}x${size}.png
            sips -z $((size*2)) $((size*2)) turbostage/content/icon.png \
              --out icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns icon.iconset -o icon.icns
          sips -s format png turbostage/content/splash.jpg --out splash.png

      - name: Run package build
        run: |
          poetry-dynamic-versioning
          pyinstaller --onefile --windowed --icon=icon.icns \
            --add-data "turbostage/content:turbostage/content" \
            --add-data "turbostage/conf:turbostage/conf" \
            -n turbostage turbostage/main.py

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg --volname "TurboStage" \
                     --overwrite \
                     --background "splash.png" \
                     --app-drop-link 300 200 \
                     "dist/TurboStage.dmg" "dist/turbostage.app"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda
        with:
          files: dist/TurboStage.dmg
